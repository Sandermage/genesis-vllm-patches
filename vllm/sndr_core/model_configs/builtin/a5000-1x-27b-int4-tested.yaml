# SPDX-License-Identifier: Apache-2.0
# Genesis builtin model config — 27B Lorbus INT4 fp8 KV, SINGLE A5000 (TESTED)
# Source: scripts/launch/start_27b_int4_no_TQ_short_single_card.sh
#
# 2026-05-06 LIFECYCLE CHANGE: marked `tested` — same fp8_e5m2 underperformance
# story as 2× sister. Kept for QA/regression on single-card setups; for
# production single-card Genesis, expand the catalog with a TQ k8v4 1× config.

key: a5000-1x-27b-int4-tested
title: 1× RTX A5000 — 27B INT4 + fp8 KV (TESTED — QA-only, single-card)
description: >-
  Single-card variant of a5000-2x-27b-int4-tested. Same model + KV dtype
  + spec decode, scaled down (max_model_len 60K due to single-card KV
  pool). KEPT FOR QA / single-card regression-test only.
schema_version: 1
maintainer: sandermage
last_validated: '2026-05-05'
genesis_pin: 991dc1a
vllm_pin_required: 0.20.2rc1.dev9+g01d4d1ad3
lifecycle: tested
workload_tag: regression-test

hardware:
  gpu_match_keys: [rtx a5000, rtx 3090, rtx 4090]
  n_gpus: 1
  min_vram_per_gpu_mib: 22000
  cuda_capability_min: [8, 6]

model_path: /models/Qwen3.6-27B-int4-AutoRound
served_model_name: qwen3.6-27b
quantization: null
kv_cache_dtype: turboquant_k8v4   # 2026-05-07 switched from fp8_e5m2 — TQ k8v4 doubles KV concurrency; 78K max fits single 24 GB card

max_model_len: 78000
gpu_memory_utilization: 0.95
max_num_seqs: 1
max_num_batched_tokens: 4096
enable_chunked_prefill: true
dtype: float16
cudagraph_mode: FULL_AND_PIECEWISE   # vllm default — Genesis stack standard
enforce_eager: false
disable_custom_all_reduce: true
language_model_only: true
trust_remote_code: true

enable_auto_tool_choice: true
tool_call_parser: qwen3_coder
reasoning_parser: qwen3

spec_decode:
  method: mtp
  num_speculative_tokens: 3

# Comment density: see a5000-2x-35b-prod.yaml for full per-env-var commentary
# (W-B exemplar 2026-05-06). This config shares most env vars with 35B PROD;
# unique env vars below are commented inline. Run `genesis explain <patch-id>`
# for any P*/PN* runtime details.
genesis_env:
  # ── Core spec_decode + tool-call ──
  GENESIS_ENABLE_P58_ASYNC_PLACEHOLDER_FIX: '1'
  GENESIS_ENABLE_P60_GDN_NGRAM_FIX: '1'
  GENESIS_ENABLE_P60B_TRITON_KERNEL: '1'
  # P61 REMOVED 2026-05-11 audit — RETIRED 2026-05-06 (superseded by P12 v2).
  GENESIS_ENABLE_P61C_QWEN3CODER_DEFERRED_COMMIT: '1'    # PR38 Day 3 (2026-05-08): close club-3090#72 SSE silence on narrative <tool_call>
  GENESIS_ENABLE_P61B_STREAMING_OVERLAP: '1'
  GENESIS_ENABLE_P62_STRUCT_OUT_SPEC_TIMING: '1'
  GENESIS_ENABLE_P64_QWEN3CODER_MTP_STREAMING: '1'
  GENESIS_ENABLE_P66_CUDAGRAPH_SIZE_FILTER: '1'
  GENESIS_ENABLE_P67_TQ_MULTI_QUERY_KERNEL: '1'    # required for spec_decode + TQ
  GENESIS_P67_USE_UPSTREAM: '1'
  GENESIS_P67_NUM_KV_SPLITS: '32'                  # single-card TP=1; 32 conservative — sweep later if needed
  GENESIS_ENABLE_P68_AUTO_FORCE_TOOL: '1'
  GENESIS_ENABLE_P69_LONG_CTX_TOOL_REMINDER: '1'
  GENESIS_P68_P69_LONG_CTX_THRESHOLD_CHARS: '50000'
  GENESIS_ENABLE_P72_PROFILE_RUN_CAP: '1'
  GENESIS_PROFILE_RUN_CAP_M: '4096'
  GENESIS_ENABLE_P74_CHUNK_CLAMP: '1'
  GENESIS_ENABLE_P78_TOLIST_CAPTURE_GUARD: '0'
  GENESIS_ENABLE_P81_FP8_BLOCK_SCALED_M_LE_8: '0'
  GENESIS_ENABLE_P82: '1'                          # P82 sweep 2026-05-09 на 2x sister wins; conservative copy for 1x (verify bench)
  GENESIS_P82_THRESHOLD_SINGLE: '0.1'
  GENESIS_ENABLE_P98: '1'                          # CRITICAL: TQ k8v4 + hybrid GDN (vllm#40941 WorkspaceManager fix)
  GENESIS_ENABLE_P99: '1'
  GENESIS_ENABLE_P101: '1'
  # P100 REMOVED 2026-05-11 audit: canonical "Blackwell-only".
  GENESIS_ENABLE_PN8_MTP_DRAFT_ONLINE_QUANT: '1'   # saves ~1-2 GiB VRAM
  GENESIS_ENABLE_PN11_GDN_AB_CONTIGUOUS: '1'
  GENESIS_ENABLE_PN59_STREAMING_GDN: '1'           # ctx >= 64K hybrid (Cliff 2b OOM guard)
  GENESIS_PREALLOC_TOKEN_BUDGET: '4096'
  GENESIS_ENABLE_PN19_SCOPED_MAX_SPLIT: '1'
  GENESIS_ENABLE_PN25_SILU_INDUCTOR_SAFE: '1'
  GENESIS_ENABLE_PN77_FP8_LM_HEAD: '1'    # Phase E.6 Marlin tier — proven on 27B+TQ k8v4 (+21% TPS).
  GENESIS_ENABLE_PN31_FA_VARLEN_PERSISTENT_OUT: '1'   # FA varlen persistent out buffer — designed for 1×24GB single-GPU
  # ── GroupAB (2026-04-30) — proven +9.2% TPS on 27B INT4+TQ ──
  GENESIS_ENABLE_P94: '1'
  GENESIS_ENABLE_P103: '1'
  GENESIS_ENABLE_PN12_FFN_INTERMEDIATE_POOL: '1'
  GENESIS_ENABLE_PN14_TQ_DECODE_OOB_CLAMP: '1'
  # ── Wave 1 (2026-05-09) — defensive Wave-1 enables aligned with 2x sister ──
  GENESIS_ENABLE_P107_MTP_TRUNCATION_DETECTOR: '1'
  GENESIS_ENABLE_PN17_FA2_LSE_CLAMP: '1'
  GENESIS_ENABLE_PN52_PROMPT_LOGPROBS_EVICTION: '1'
  GENESIS_ENABLE_PN56_QWEN3CODER_XML_FALLBACK: '1'
  GENESIS_ENABLE_PN66: '1'
  GENESIS_ENABLE_PN67: '1'
  GENESIS_ENABLE_P95: '1'
  GENESIS_ENABLE_P70_AUTO_STRICT_NGRAM: '1'
  # ── 27B-specific (hybrid GDN + Mamba) ──
  GENESIS_ENABLE_PN82_MAMBA_CUDAGRAPH_PREFILL_ZERO: '1'
  GENESIS_ENABLE_PN30_DS_LAYOUT_SPEC_DECODE: '1'
  # ── Wave 3.1 — probabilistic draft rejection ──
  GENESIS_ENABLE_PN90_PROBABILISTIC_DRAFT: '1'
  # ── Wave 7 — PN16 v2 + tool budget + observability ──
  GENESIS_ENABLE_PN16_LAZY_REASONER: '1'
  GENESIS_PN16_TOOL_THINK_BUDGET: '200'
  GENESIS_PN16_CLASSIFIER_MAX_TOKENS: '0'
  GENESIS_OBSERVABILITY: '1'
  GENESIS_BUFFER_MODE: shared
  GENESIS_TQ_MAX_MODEL_LEN: '131072'

system_env:
  PYTORCH_CUDA_ALLOC_CONF: 'expandable_segments:True,max_split_size_mb:256'
  VLLM_NO_USAGE_STATS: '1'
  VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS: '1'    # vllm#30515 — accurate KV pool sizing under cudagraph capture
  VLLM_LOGGING_LEVEL: WARNING
  VLLM_FLOAT32_MATMUL_PRECISION: high
  VLLM_USE_FLASHINFER_SAMPLER: '1'
  VLLM_USE_FUSED_MOE_GROUPED_TOPK: '1'
  VLLM_ALLOW_LONG_MAX_MODEL_LEN: '1'
  TRITON_CACHE_DIR: /root/.triton/cache
  VLLM_WORKER_MULTIPROC_METHOD: spawn
  VLLM_MARLIN_USE_ATOMIC_ADD: '1'
  OMP_NUM_THREADS: '1'
  CUDA_DEVICE_MAX_CONNECTIONS: '8'

vllm_extra_args: []

api_key: genesis-local
host: 0.0.0.0

docker:
  image: vllm/vllm-openai:nightly
  container_name: vllm-server-mtp-test-1x
  port: 8002
  shm_size: 8g
  memory_limit: 32g
  network: genesis-vllm-patches_default
  gpus: '"device=0"'
  mounts:
    - ${models_dir}:/models:ro
    - ${hf_cache}:/root/.cache/huggingface:ro
    - ${cache_root}/triton-cache-27b-1x:/root/.triton/cache
    - ${cache_root}/compile-cache-27b-1x:/root/.cache/vllm/torch_compile_cache
    - ${genesis_src}:/usr/local/lib/python3.12/dist-packages/vllm/sndr_core:ro
    - ${plugin_src}:/plugin:ro
  extra_run_flags:
    - --security-opt label=disable

reference_metrics:
  measured_at: '2026-05-05T17:55:00Z'
  bench_method: bench_27b.sh × 5 sections (cuda graph mode)
  long_gen_sustained_tps: 66.8
  long_gen_mean_lat_s: 14.96
  short_gen_tps: 32.2
  tool_call_score: 10/10
  stability_mean_s: 3.883
  stability_cv_pct: 1.22
  concurrent_4_total_s: 9.89
  vram_used_mib_per_gpu: [20983]
  vram_total_mib: 20983
  genesis_pin: 991dc1a
  vllm_pin: 0.20.2rc1.dev9+g01d4d1ad3

verify_tolerances:
  tps_drop_pct_max: 7.0
  tool_call_min: 9/10
  stability_cv_pct_max: 5.0
  vram_increase_mib_max: 1500

verified_on:
  - 'sandermage/2xA5000-A2 (used GPU 0 only): 66.8 TPS, 10/10 tool, 991dc1a, 2026-05-05'

notes:
  - 'ℹ Single-card on 24 GB: max_model_len 78K with TurboQuant k8v4 KV (2026-05-07 switched from fp8_e5m2 + 60K). TQ k8v4 doubles KV concurrency for ~5-15% TPS cost — net win on memory-bound single-card workloads. (Field `max_model_len: 78000` is authoritative — earlier 131K claim was stale.)'
  - 'ℹ Sister of 2×27b-int4-tq-k8v4 (same KV regime, half the GPUs, half max_num_seqs)'
  - 'ℹ Suitable for: 1× 3090 / 4090 / A5000'
  - '⚠ P98 CRITICAL: hybrid GDN + TQ k8v4 requires WorkspaceManager fix (vllm#40941)'
  - 'ℹ With ESTIMATE_CUDAGRAPHS=1 vllm now correctly reserves CG capture budget — KV pool sizing is honest, no silent OOM risk'
