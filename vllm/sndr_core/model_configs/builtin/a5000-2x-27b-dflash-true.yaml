# SPDX-License-Identifier: Apache-2.0
# Genesis builtin model config — 27B Lorbus INT4 + TRUE DFlash spec-decode
# Source: noonghunna/qwen36-dual-3090/compose/docker-compose.dflash.yml
#
# This is a CONCEPTUALLY DIFFERENT spec-decode method from MTP/ngram:
#   - Separate DFlash drafter model: Qwen3.6-27B-DFlash (z-lab) at /models/Qwen3.6-27B-DFlash
#   - DFlash needs head_size=256 + non-causal attention → no Ampere backend
#     supports that triple with fp8/turbo KV → fp16 default is the ONLY working choice
#   - bfloat16 dtype (not float16 — DFlash drafter expects bf16)
#   - Lower max_model_len 185K (vs 256K for MTP) — DFlash + cudagraph + KV pool tight
#   - max_num_seqs=1 (single-stream — DFlash optimized for sequential)
#   - All 5 PN-DFlash patches (PN21/PN23/PN24/PN38/PN40) are designed for THIS path
#
# Expected per noonghunna 2× 3090 BENCHMARKS row 4: 78 TPS narrative, 128 TPS code
# vs MTP 89 TPS narr / 71 TPS code — DFlash wins on code, loses on narrative.

key: a5000-2x-27b-dflash-true
title: 2× RTX A5000 — 27B INT4 + TRUE DFlash N=5 spec-decode
description: >-
  Qwen3.6-27B-int4-AutoRound + separate Qwen3.6-27B-DFlash drafter (z-lab),
  DFlash N=5 spec-decode method, fp16 KV (head_size=256 constraint), bfloat16
  dtype, single-stream optimization. Fastest single-stream code TPS in the
  Genesis catalog. Use when single-user code generation throughput matters
  more than concurrent serving.
schema_version: 1
maintainer: sandermage
last_validated: '2026-05-06'
genesis_pin: f9576df
vllm_pin_required: 0.20.2rc1.dev9+g01d4d1ad3
lifecycle: stable
workload_tag: high-tps

hardware:
  gpu_match_keys: [rtx a5000]
  n_gpus: 2
  min_vram_per_gpu_mib: 22000
  cuda_capability_min: [8, 6]

model_path: /models/Qwen3.6-27B-int4-AutoRound
served_model_name: qwen3.6-27b-dflash
quantization: auto_round   # explicit — not auto-detected for DFlash path
kv_cache_dtype: null       # default fp16 — DFlash needs head_size=256 + non-causal

max_model_len: 185000
gpu_memory_utilization: 0.95
max_num_seqs: 1
max_num_batched_tokens: 8192
enable_chunked_prefill: true
dtype: bfloat16            # NOT float16 — DFlash drafter expects bf16
cudagraph_mode: FULL_AND_PIECEWISE
enforce_eager: false
disable_custom_all_reduce: true
language_model_only: true
trust_remote_code: true

enable_auto_tool_choice: true
tool_call_parser: qwen3_coder
reasoning_parser: qwen3

spec_decode:
  method: dflash
  num_speculative_tokens: 5
  model: /models/Qwen3.6-27B-DFlash   # separate z-lab drafter checkpoint

# Comment density: see a5000-2x-35b-prod.yaml for full per-env-var commentary
# (W-B exemplar 2026-05-06). This config shares most env vars with 35B PROD;
# unique env vars below are commented inline. Run `genesis explain <patch-id>`
# for any P*/PN* runtime details.
genesis_env:
  # Core stack (always-on Qwen3 tool-call quality)
  GENESIS_ENABLE_P58_ASYNC_PLACEHOLDER_FIX: '1'
  GENESIS_ENABLE_P60_GDN_NGRAM_FIX: '1'
  GENESIS_ENABLE_P60B_TRITON_KERNEL: '1'
  # P61 REMOVED 2026-05-11 audit — RETIRED 2026-05-06 (anchor not found on dev93).
  GENESIS_ENABLE_P61C_QWEN3CODER_DEFERRED_COMMIT: '1'    # PR38 Day 3 (2026-05-08): close club-3090#72 SSE silence on narrative <tool_call>
  GENESIS_ENABLE_P61B_STREAMING_OVERLAP: '1'
  GENESIS_ENABLE_P62_STRUCT_OUT_SPEC_TIMING: '1'
  GENESIS_ENABLE_P64_QWEN3CODER_MTP_STREAMING: '1'
  GENESIS_ENABLE_P66_CUDAGRAPH_SIZE_FILTER: '1'
  GENESIS_ENABLE_P68_AUTO_FORCE_TOOL: '1'
  GENESIS_ENABLE_P69_LONG_CTX_TOOL_REMINDER: '1'
  GENESIS_P68_P69_LONG_CTX_THRESHOLD_CHARS: '50000'
  GENESIS_ENABLE_P72_PROFILE_RUN_CAP: '1'
  GENESIS_PROFILE_RUN_CAP_M: '4096'
  GENESIS_ENABLE_P74_CHUNK_CLAMP: '1'
  GENESIS_ENABLE_P82: '0'
  GENESIS_P82_THRESHOLD_SINGLE: '0.3'
  GENESIS_ENABLE_P78_TOLIST_CAPTURE_GUARD: '0'
  GENESIS_ENABLE_P81_FP8_BLOCK_SCALED_M_LE_8: '0'
  GENESIS_ENABLE_PN11_GDN_AB_CONTIGUOUS: '1'
  GENESIS_ENABLE_PN59_STREAMING_GDN: '1'
  # ── DFlash family (the ones that actually fire on dflash path) ──────
  GENESIS_ENABLE_PN21_DFLASH_SWA: '1'
  GENESIS_ENABLE_PN23_DFLASH_DTYPE_FIX: '1'
  GENESIS_ENABLE_PN24_DFLASH_AUX_LAYER_FIX: '1'
  GENESIS_ENABLE_PN38_DFLASH_QUANT_DRAFTER: '1'
  GENESIS_ENABLE_PN40_DFLASH_OMNIBUS: '1'
  GENESIS_PREALLOC_TOKEN_BUDGET: '4096'
  GENESIS_ENABLE_PN19_SCOPED_MAX_SPLIT: '1'    # vllm#41268 backport — max_split_size_mb=20 scope-restored during model load
  GENESIS_ENABLE_PN25_SILU_INDUCTOR_SAFE: '1'    # Cliff 1B closure (Inductor opaque-op pool for SiluAndMul); preventive — NULL impact on 2xA5000, win for 24GB community
  GENESIS_ENABLE_PN77_FP8_LM_HEAD: '1'    # Phase E.6 Marlin tier — proven on 27B+TQ k8v4 (+21% TPS) and 35B PROD (+6% TPS, tool 10/10). Hardware-tier dispatch.
  GENESIS_BUFFER_MODE: shared

system_env:
  PYTORCH_CUDA_ALLOC_CONF: 'expandable_segments:True,max_split_size_mb:256'
  VLLM_NO_USAGE_STATS: '1'
  VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS: '1'    # vllm#30515 — accurate KV pool sizing under cudagraph capture
  VLLM_LOGGING_LEVEL: WARNING
  VLLM_FLOAT32_MATMUL_PRECISION: high
  VLLM_SSM_CONV_STATE_LAYOUT: DS
  VLLM_USE_FLASHINFER_SAMPLER: '1'
  VLLM_USE_FUSED_MOE_GROUPED_TOPK: '1'
  VLLM_ALLOW_LONG_MAX_MODEL_LEN: '1'
  TRITON_CACHE_DIR: /root/.triton/cache
  VLLM_WORKER_MULTIPROC_METHOD: spawn
  VLLM_MARLIN_USE_ATOMIC_ADD: '1'
  NCCL_P2P_DISABLE: '1'
  NCCL_CUMEM_ENABLE: '0'
  OMP_NUM_THREADS: '1'
  CUDA_DEVICE_MAX_CONNECTIONS: '8'

vllm_extra_args: []

api_key: genesis-local
host: 0.0.0.0

docker:
  image: vllm/vllm-openai:nightly
  container_name: vllm-server-dflash
  port: 8000
  shm_size: 16g
  memory_limit: 64g
  network: genesis-vllm-patches_default
  gpus: all
  mounts:
    - ${models_dir}:/models:ro
    - ${hf_cache}:/root/.cache/huggingface:ro
    - ${cache_root}/triton-cache-dflash-true:/root/.triton/cache
    - ${cache_root}/compile-cache-dflash-true:/root/.cache/vllm/torch_compile_cache
    - ${genesis_src}:/usr/local/lib/python3.12/dist-packages/vllm/sndr_core:ro
    - ${plugin_src}:/plugin:ro
  extra_run_flags:
    - --security-opt label=disable

reference_metrics:
  measured_at: '2026-05-05T21:22:13Z'
  bench_method: genesis model-config bench-and-update (verify._bench_long_gen×3 / tool×10 / stability×5)
  long_gen_sustained_tps: 97.6
  long_gen_mean_lat_s: 10.25
  tool_call_score: '10/10'
  stability_mean_s: 2.002
  stability_cv_pct: 2.04
  vram_used_mib_per_gpu: [22040, 22040]
  vram_total_mib: 44080
  genesis_pin: f9576df
  vllm_pin: 0.20.2rc1.dev9+g01d4d1ad3

verify_tolerances:
  tps_drop_pct_max: 10.0
  tool_call_min: 8/10
  stability_cv_pct_max: 10.0
  vram_increase_mib_max: 2000

notes:
  - 'ℹ True DFlash spec method (vs sister `-tq-k8v4-dflash` which is MTP+PN-DFlash patches over TQ KV)'
  - 'ℹ Drafter: separate model /models/Qwen3.6-27B-DFlash (z-lab) — must be present on host'
  - 'ℹ Expected per noonghunna BENCHMARKS: 78 TPS narrative, 128 TPS code (single-stream peak)'
  - 'ℹ KV dtype is fp16 (default) — DFlash needs head_size=256 + non-causal attn, no fp8/turbo Ampere backend'
  - 'ℹ dtype: bfloat16 (NOT float16) — DFlash drafter expects bf16'
  - 'ℹ max_num_seqs=1 — DFlash is single-stream optimized; for concurrency use TQ k8v4 variant'
  - 'ℹ All 5 PN-DFlash patches (PN21/23/24/38/40) are designed for THIS path and fire here'
  - 'ℹ Lifecycle = experimental until bench-and-update fills reference_metrics'
  - '⚠ Do NOT switch kv_cache_dtype to fp8/TQ — DFlash will crash'
