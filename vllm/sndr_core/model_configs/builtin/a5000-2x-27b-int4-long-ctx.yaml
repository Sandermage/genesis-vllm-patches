# SPDX-License-Identifier: Apache-2.0
# Genesis builtin model config — 27B Lorbus INT4 fp8 KV, LONG-CONTEXT variant
# Source: scripts/launch/_archive/superseded_by_model_configs/start_27b_int4_no_TQ_long_256K.sh
#         (research progenitor: scripts/launch/_archive/research/start_v791_27b_long_ctx_pn8.sh)
#
# Sister of a5000-2x-27b-int4-balanced (the short-ctx 128K high-TPS variant).
# Same model + KV dtype + spec decode; trades TPS for stable 256K context.
# Memory regime relaxed: util 0.95→0.90, seqs 4→2, batched 8192→2048.
# v791 progressive probe 16K→256K all passed (121s prefill at 256K) on
# 2× A5000 / pin 0.20.2rc1.dev9+g01d4d1ad3.

key: a5000-2x-27b-int4-long-ctx
title: 2× RTX A5000 — 27B INT4 + fp8 KV (long context, 256K)
description: >-
  Long-context variant of the 27B INT4 balanced config. Same model and
  KV dtype, scaled-down memory regime (util 0.90 / seqs 2 / batched 2048)
  to fit 256K context window. Suitable for needle-in-haystack, long
  document QA, multi-file code review.
schema_version: 1
maintainer: sandermage
last_validated: '2026-05-06'
genesis_pin: f9576df
vllm_pin_required: 0.20.2rc1.dev9+g01d4d1ad3
lifecycle: stable
workload_tag: long-context

hardware:
  gpu_match_keys: [rtx a5000]
  n_gpus: 2
  min_vram_per_gpu_mib: 22000
  cuda_capability_min: [8, 6]

model_path: /models/Qwen3.6-27B-int4-AutoRound
served_model_name: qwen3.6-27b
quantization: null
kv_cache_dtype: fp8_e5m2

max_model_len: 280000
gpu_memory_utilization: 0.90
max_num_seqs: 2
max_num_batched_tokens: 2048
enable_chunked_prefill: true
dtype: float16
cudagraph_mode: FULL_AND_PIECEWISE   # vllm default — Genesis stack standard
enforce_eager: false
disable_custom_all_reduce: true
language_model_only: true
trust_remote_code: true

enable_auto_tool_choice: true
tool_call_parser: qwen3_coder
reasoning_parser: qwen3

spec_decode:
  method: mtp
  num_speculative_tokens: 3

# Comment density: see a5000-2x-35b-prod.yaml for full per-env-var commentary
# (W-B exemplar 2026-05-06). This config shares most env vars with 35B PROD;
# unique env vars below are commented inline. Run `genesis explain <patch-id>`
# for any P*/PN* runtime details.
genesis_env:
  # ── Core spec_decode + tool-call ──
  GENESIS_ENABLE_P58_ASYNC_PLACEHOLDER_FIX: '1'
  GENESIS_ENABLE_P60_GDN_NGRAM_FIX: '1'
  GENESIS_ENABLE_P60B_TRITON_KERNEL: '1'
  # P61 REMOVED 2026-05-11 audit — RETIRED 2026-05-06.
  GENESIS_ENABLE_P61C_QWEN3CODER_DEFERRED_COMMIT: '1'    # PR38 Day 3 (2026-05-08): close club-3090#72 SSE silence on narrative <tool_call>
  GENESIS_ENABLE_P61B_STREAMING_OVERLAP: '1'
  GENESIS_ENABLE_P62_STRUCT_OUT_SPEC_TIMING: '1'
  GENESIS_ENABLE_P64_QWEN3CODER_MTP_STREAMING: '1'
  GENESIS_ENABLE_P66_CUDAGRAPH_SIZE_FILTER: '1'
  GENESIS_ENABLE_P67_TQ_MULTI_QUERY_KERNEL: '1'
  GENESIS_P67_USE_UPSTREAM: '1'
  GENESIS_ENABLE_P68_AUTO_FORCE_TOOL: '1'
  GENESIS_ENABLE_P69_LONG_CTX_TOOL_REMINDER: '1'
  GENESIS_P68_P69_LONG_CTX_THRESHOLD_CHARS: '50000'
  GENESIS_ENABLE_P72_PROFILE_RUN_CAP: '1'
  GENESIS_PROFILE_RUN_CAP_M: '4096'
  GENESIS_ENABLE_P74_CHUNK_CLAMP: '1'
  GENESIS_ENABLE_P82: '0'                            # 27B LC keeps P82=0 (fp8_e5m2 KV path; aligns with DFlash sister)
  GENESIS_ENABLE_P99: '1'
  GENESIS_ENABLE_P91: '1'                            # AutoRound row-parallel (Marlin tier autoroute)
  GENESIS_ENABLE_P87: '1'                            # Marlin pad (autoroute)
  # P83 + P85 REMOVED 2026-05-11 audit:
  # - P85 declares requires_patches=[P84] but P84 НЕ enabled → broken dependency
  # - feedback_p83_p84_p85_cache_no_cake: prefix-cache regresses TPS -30%
  # - PROD has --enable-prefix-caching disabled anyway → P83/P85 are dead code
  GENESIS_ENABLE_P101: '1'
  # P100 REMOVED 2026-05-11 audit: canonical "Blackwell-only"; на Ampere SM 8.6 = no-op.
  GENESIS_ENABLE_P78_TOLIST_CAPTURE_GUARD: '0'
  GENESIS_ENABLE_P81_FP8_BLOCK_SCALED_M_LE_8: '0'
  GENESIS_ENABLE_PN8_MTP_DRAFT_ONLINE_QUANT: '1'
  GENESIS_ENABLE_PN11_GDN_AB_CONTIGUOUS: '1'
  GENESIS_ENABLE_PN59_STREAMING_GDN: '1'
  # ── GroupAB (2026-04-30) — proven +9.2% TPS on 27B INT4+TQ at 512t ──
  GENESIS_ENABLE_P94: '1'
  GENESIS_ENABLE_P103: '1'
  GENESIS_ENABLE_PN12_FFN_INTERMEDIATE_POOL: '1'
  # PN13 REMOVED 2026-05-11 audit — RETIRED 2026-05-04 (upstream merged vllm#41235).
  GENESIS_ENABLE_PN14_TQ_DECODE_OOB_CLAMP: '1'
  GENESIS_ENABLE_PN17_FA2_LSE_CLAMP: '1'
  GENESIS_ENABLE_PN19_SCOPED_MAX_SPLIT: '1'
  GENESIS_ENABLE_PN25_SILU_INDUCTOR_SAFE: '1'    # Cliff 1B closure (Inductor opaque-op pool for SiluAndMul); preventive — NULL impact on 2xA5000, win for 24GB community
  GENESIS_ENABLE_PN77_FP8_LM_HEAD: '1'    # Phase E.6 Marlin tier — proven on 27B+TQ k8v4 (+21% TPS) and 35B PROD (+6% TPS, tool 10/10).
  GENESIS_ENABLE_PN22_LOCAL_ARGMAX_TP: '1'
  # ── Wave 1 (2026-05-09) — narrow defensive bug fixes, all default OFF ──
  GENESIS_ENABLE_P107_MTP_TRUNCATION_DETECTOR: '1'   # vllm#41467 — defensive at think→tool_call boundary
  GENESIS_ENABLE_PN52_PROMPT_LOGPROBS_EVICTION: '1'  # vllm#41411 — prompt_logprobs eviction fix
  GENESIS_ENABLE_PN56_QWEN3CODER_XML_FALLBACK: '1'   # vllm#41466 — XML fallback safety
  GENESIS_ENABLE_PN66: '1'                           # vllm#41696 — multiturn </think> leak fix
  GENESIS_ENABLE_PN67: '1'                           # vllm#41674 — thinking_budget bool guard
  GENESIS_ENABLE_P95: '1'                            # vllm#40385 — Marlin TP cudagraph cap
  GENESIS_ENABLE_P70_AUTO_STRICT_NGRAM: '1'          # club-3090#34 ngram quality cliff closure (added in Wave 8 audit)
  # ── 27B-specific (hybrid GDN + Mamba) ──
  GENESIS_ENABLE_PN82_MAMBA_CUDAGRAPH_PREFILL_ZERO: '1'  # vllm#41873 — zeros padded `is_prefilling` rows
  GENESIS_ENABLE_PN30_DS_LAYOUT_SPEC_DECODE: '1'     # issue #17 — DS conv state + spec-decode accept_len>1 protection
  # ── Wave 3.1 (2026-05-09) — probabilistic draft rejection ──
  GENESIS_ENABLE_PN90_PROBABILISTIC_DRAFT: '1'       # vllm#40269 backport — +7.4% TPS на 27B INT4+TQ; bench long-ctx pending after this Wave 8 enable.
  # ── Wave 7 (2026-05-09) — PN16 v2 + V8 tool-budget + observability ──
  GENESIS_ENABLE_PN16_LAZY_REASONER: '1'             # PN16 v2 — cache-safe.
  GENESIS_PN16_TOOL_THINK_BUDGET: '200'              # V8 — short system msg cap on <think> for tool-attached requests.
  GENESIS_PN16_CLASSIFIER_MAX_TOKENS: '0'            # V7 OFF.
  GENESIS_OBSERVABILITY: '1'
  GENESIS_PREALLOC_TOKEN_BUDGET: '4096'
  GENESIS_BUFFER_MODE: shared

system_env:
  PYTORCH_CUDA_ALLOC_CONF: 'expandable_segments:True,max_split_size_mb:256'
  VLLM_NO_USAGE_STATS: '1'
  VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS: '1'    # vllm#30515 — accurate KV pool sizing under cudagraph capture
  VLLM_LOGGING_LEVEL: WARNING
  VLLM_FLOAT32_MATMUL_PRECISION: high
  VLLM_SSM_CONV_STATE_LAYOUT: DS
  VLLM_USE_FLASHINFER_SAMPLER: '1'
  VLLM_USE_FUSED_MOE_GROUPED_TOPK: '1'
  VLLM_ALLOW_LONG_MAX_MODEL_LEN: '1'
  TRITON_CACHE_DIR: /root/.triton/cache
  VLLM_WORKER_MULTIPROC_METHOD: spawn
  VLLM_MARLIN_USE_ATOMIC_ADD: '1'
  NCCL_P2P_DISABLE: '1'
  NCCL_CUMEM_ENABLE: '0'
  OMP_NUM_THREADS: '1'
  CUDA_DEVICE_MAX_CONNECTIONS: '8'

vllm_extra_args: []

api_key: genesis-local
host: 0.0.0.0

docker:
  image: vllm/vllm-openai:nightly
  container_name: vllm-server-mtp-test-longctx
  port: 8003
  shm_size: 8g
  memory_limit: 64g
  network: genesis-vllm-patches_default
  gpus: all
  mounts:
    - ${models_dir}:/models:ro
    - ${hf_cache}:/root/.cache/huggingface:ro
    - ${cache_root}/triton-cache-int4-mtp:/root/.triton/cache
    - ${cache_root}/compile-cache-int4-mtp:/root/.cache/vllm/torch_compile_cache
    - ${genesis_src}:/usr/local/lib/python3.12/dist-packages/vllm/sndr_core:ro
    - ${plugin_src}:/plugin:ro
  extra_run_flags:
    - --security-opt label=disable

# No reference_metrics in this builtin: the v791 sprint validated stability
# (16K→256K probe all-pass, 121s prefill at 256K) but did NOT bench long_gen
# TPS / tool / CV against bench_27b.sh on this exact memory regime. Run
# `genesis model-config bench-and-update a5000-2x-27b-int4-long-ctx` to
# fill in. Until then, lifecycle stays `experimental`.
reference_metrics:
  measured_at: '2026-05-05T21:56:59Z'
  bench_method: genesis model-config bench-and-update (verify._bench_long_gen×3 / tool×10 / stability×5)
  long_gen_sustained_tps: 38.6
  long_gen_mean_lat_s: 25.89
  tool_call_score: '10/10'
  stability_mean_s: 4.467
  stability_cv_pct: 6.75
  vram_used_mib_per_gpu: [22467, 21776]
  vram_total_mib: 44243
  genesis_pin: f9576df
  vllm_pin: 0.20.2rc1.dev9+g01d4d1ad3

verify_tolerances:
  tps_drop_pct_max: 10.0
  tool_call_min: 8/10
  stability_cv_pct_max: 10.0
  vram_increase_mib_max: 2000

notes:
  - 'ℹ Sister config to a5000-2x-27b-int4-balanced (short ctx 128K, util=0.95)'
  - 'ℹ Use this when long context > TPS; use balanced when single-turn TPS matters'
  - 'ℹ Validated stability 16K→256K progressive probe 2026-04-29 (memory regime)'
  - 'ℹ fp8_e5m2 KV — see `a5000-2x-27b-int4-tq-k8v4` for TurboQuant k8v4 variant'
  - '⚠ Do NOT enable --enable-prefix-caching (DS conv state crash on hybrid GDN)'
  - '⚠ TPS is generation-length dependent on this stack (~85-100 tok/s @ 512t)'
  - '⚠ Lifecycle = experimental until bench-and-update fills reference_metrics'
