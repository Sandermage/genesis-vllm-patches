# SPDX-License-Identifier: Apache-2.0
# Genesis builtin model config — 27B Lorbus INT4 + TQ k8v4 + DFlash patches
# Source: clone of a5000-2x-27b-int4-tq-k8v4 + 5 PN-DFlash env toggles.
#
# Goal: A/B test DFlash optimizations (PN21 SWA, PN23 dtype fix, PN24 aux
# layer indexing, PN38 quant drafter, PN40 4-part omnibus) on top of the
# proven TQ k8v4 + MTP K=3 stack. PN40 is the most likely TPS contributor
# on MTP — sub-D workload classifier composes with non-DFlash spec methods
# per dispatcher applies_to: {spec_method: [dflash, mtp]}. Other PN-DFlash
# patches may no-op on MTP (drafter not quantized, no aux layer mismatch);
# bench will tell.

key: a5000-2x-27b-int4-tq-k8v4-dflash
title: 2× RTX A5000 — 27B INT4 + TQ k8v4 + DFlash patches
description: >-
  A/B variant of a5000-2x-27b-int4-tq-k8v4 with 5 DFlash-family patches
  added (PN21/PN23/PN24/PN38/PN40). Same model + KV dtype + spec_decode
  method (MTP K=3) as the parent. Lifecycle = experimental until bench
  validates whether DFlash patches help / hurt / no-op on MTP path.
schema_version: 1
maintainer: sandermage
last_validated: '2026-05-06'
genesis_pin: f9576df
vllm_pin_required: 0.20.2rc1.dev9+g01d4d1ad3
# RETIRED 2026-05-11 audit:
# - DFlash-family PN21/PN23/PN24/PN38 are spec_method=[dflash] only — no-op on MTP path
# - PN40_DFLASH_OMNIBUS fires on MTP and adds overhead without payback
# - Documented bench: -23.6% TPS vs sister TQ k8v4 (83.9 vs 109.8 → 130.79)
# - For true DFlash A/B see sister config `a5000-2x-27b-dflash-true` (spec_method=dflash)
# - This builtin is preserved as a documented negative result; do NOT launch in PROD.
lifecycle: retired
workload_tag: balanced

hardware:
  gpu_match_keys: [rtx a5000]
  n_gpus: 2
  min_vram_per_gpu_mib: 22000
  cuda_capability_min: [8, 6]

model_path: /models/Qwen3.6-27B-int4-AutoRound
served_model_name: qwen3.6-27b
quantization: null
kv_cache_dtype: turboquant_k8v4

max_model_len: 131072
gpu_memory_utilization: 0.92
max_num_seqs: 4
max_num_batched_tokens: 4096
enable_chunked_prefill: true
dtype: float16
cudagraph_mode: FULL_AND_PIECEWISE
enforce_eager: false
disable_custom_all_reduce: true
language_model_only: true
trust_remote_code: true

enable_auto_tool_choice: true
tool_call_parser: qwen3_coder
reasoning_parser: qwen3

spec_decode:
  method: mtp
  num_speculative_tokens: 3

# Comment density: see a5000-2x-35b-prod.yaml for full per-env-var commentary
# (W-B exemplar 2026-05-06). This config shares most env vars with 35B PROD;
# unique env vars below are commented inline. Run `genesis explain <patch-id>`
# for any P*/PN* runtime details.
genesis_env:
  GENESIS_ENABLE_P58_ASYNC_PLACEHOLDER_FIX: '1'
  GENESIS_ENABLE_P60_GDN_NGRAM_FIX: '1'
  GENESIS_ENABLE_P60B_TRITON_KERNEL: '1'
  GENESIS_ENABLE_P61_QWEN3_MULTI_TOOL: '1'
  GENESIS_ENABLE_P61C_QWEN3CODER_DEFERRED_COMMIT: '1'    # PR38 Day 3 (2026-05-08): close club-3090#72 SSE silence on narrative <tool_call>
  GENESIS_ENABLE_P61B_STREAMING_OVERLAP: '1'
  GENESIS_ENABLE_P62_STRUCT_OUT_SPEC_TIMING: '1'
  GENESIS_ENABLE_P64_QWEN3CODER_MTP_STREAMING: '1'
  GENESIS_ENABLE_P66_CUDAGRAPH_SIZE_FILTER: '1'
  GENESIS_ENABLE_P67_TQ_MULTI_QUERY_KERNEL: '1'
  GENESIS_P67_USE_UPSTREAM: '1'
  GENESIS_P67_NUM_KV_SPLITS: '32'
  GENESIS_ENABLE_P68_AUTO_FORCE_TOOL: '1'
  GENESIS_ENABLE_P69_LONG_CTX_TOOL_REMINDER: '1'
  GENESIS_P68_P69_LONG_CTX_THRESHOLD_CHARS: '50000'
  GENESIS_ENABLE_P72_PROFILE_RUN_CAP: '1'
  GENESIS_PROFILE_RUN_CAP_M: '4096'
  GENESIS_ENABLE_P74_CHUNK_CLAMP: '1'
  GENESIS_ENABLE_P82: '0'
  GENESIS_ENABLE_P98: '1'
  GENESIS_ENABLE_P99: '1'
  GENESIS_P82_THRESHOLD_SINGLE: '0.3'
  GENESIS_ENABLE_P101: '1'
  GENESIS_ENABLE_P100: '1'
  GENESIS_ENABLE_P78_TOLIST_CAPTURE_GUARD: '0'
  GENESIS_ENABLE_P81_FP8_BLOCK_SCALED_M_LE_8: '0'
  GENESIS_ENABLE_PN8_MTP_DRAFT_ONLINE_QUANT: '1'
  GENESIS_ENABLE_PN11_GDN_AB_CONTIGUOUS: '1'
  GENESIS_ENABLE_PN59_STREAMING_GDN: '1'
  # ── DFlash patch family (the variable being tested) ─────────
  GENESIS_ENABLE_PN21_DFLASH_SWA: '1'
  GENESIS_ENABLE_PN23_DFLASH_DTYPE_FIX: '1'
  GENESIS_ENABLE_PN24_DFLASH_AUX_LAYER_FIX: '1'
  GENESIS_ENABLE_PN38_DFLASH_QUANT_DRAFTER: '1'
  GENESIS_ENABLE_PN40_DFLASH_OMNIBUS: '1'
  GENESIS_PREALLOC_TOKEN_BUDGET: '4096'
  GENESIS_ENABLE_PN19_SCOPED_MAX_SPLIT: '1'    # vllm#41268 backport — max_split_size_mb=20 scope-restored during model load
  GENESIS_ENABLE_PN25_SILU_INDUCTOR_SAFE: '1'    # Cliff 1B closure (Inductor opaque-op pool for SiluAndMul); preventive — NULL impact on 2xA5000, win for 24GB community
  GENESIS_ENABLE_PN77_FP8_LM_HEAD: '1'    # Phase E.6 Marlin tier — proven on 27B+TQ k8v4 (+21% TPS) and 35B PROD (+6% TPS, tool 10/10). Hardware-tier dispatch.
  GENESIS_BUFFER_MODE: shared
  GENESIS_TQ_MAX_MODEL_LEN: '131072'

system_env:
  PYTORCH_CUDA_ALLOC_CONF: 'expandable_segments:True,max_split_size_mb:256'
  VLLM_NO_USAGE_STATS: '1'
  VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS: '1'    # vllm#30515 — accurate KV pool sizing under cudagraph capture
  VLLM_LOGGING_LEVEL: WARNING
  VLLM_FLOAT32_MATMUL_PRECISION: high
  VLLM_SSM_CONV_STATE_LAYOUT: DS
  VLLM_USE_FLASHINFER_SAMPLER: '1'
  VLLM_USE_FUSED_MOE_GROUPED_TOPK: '1'
  VLLM_ALLOW_LONG_MAX_MODEL_LEN: '1'
  TRITON_CACHE_DIR: /root/.triton/cache
  VLLM_WORKER_MULTIPROC_METHOD: spawn
  VLLM_MARLIN_USE_ATOMIC_ADD: '1'
  NCCL_P2P_DISABLE: '1'
  NCCL_CUMEM_ENABLE: '0'
  OMP_NUM_THREADS: '1'
  CUDA_DEVICE_MAX_CONNECTIONS: '8'

vllm_extra_args: []

api_key: genesis-local
host: 0.0.0.0

docker:
  image: vllm/vllm-openai:nightly
  container_name: vllm-pn95-2xa5000-dflash  # F-013 fix 2026-05-11
  port: 8000
  shm_size: 8g
  memory_limit: 64g
  network: genesis-vllm-patches_default
  gpus: all
  mounts:
    - ${models_dir}:/models:ro
    - ${hf_cache}:/root/.cache/huggingface:ro
    - ${cache_root}/triton-cache-int4-tq-dflash:/root/.triton/cache
    - ${cache_root}/compile-cache-int4-tq-dflash:/root/.cache/vllm/torch_compile_cache
    - ${genesis_src}:/usr/local/lib/python3.12/dist-packages/vllm/sndr_core:ro
    - ${plugin_src}:/plugin:ro
  extra_run_flags:
    - --security-opt label=disable

reference_metrics:
  measured_at: '2026-05-05T21:12:29Z'
  bench_method: genesis model-config bench-and-update (verify._bench_long_gen×3 / tool×10 / stability×5)
  long_gen_sustained_tps: 83.9
  long_gen_mean_lat_s: 11.92
  tool_call_score: '10/10'
  stability_mean_s: 2.422
  stability_cv_pct: 0.24
  vram_used_mib_per_gpu: [21320, 21320]
  vram_total_mib: 42640
  genesis_pin: f9576df
  vllm_pin: 0.20.2rc1.dev9+g01d4d1ad3

verify_tolerances:
  tps_drop_pct_max: 7.0
  tool_call_min: 9/10
  stability_cv_pct_max: 8.0
  vram_increase_mib_max: 2000

notes:
  - 'ℹ A/B variant of a5000-2x-27b-int4-tq-k8v4 — same base + 5 DFlash patches'
  - '⚠ FINDING 2026-05-06: PN-DFlash patches on MTP path = -23.6% regression (83.9 vs current 109.8 TPS baseline of TQ-k8v4 sibling — was -7.8% when baseline was 91.0). PN21/PN23/PN24/PN38 are gated `spec_method=[dflash]` so do not fire on MTP; only PN40 sub-D workload classifier composes — it adds overhead without paying back on MTP. For TRUE DFlash test see sister config a5000-2x-27b-dflash-true (Qwen3.6-27B-DFlash drafter model + method=dflash).'
  - 'ℹ Stability + tool quality identical to baseline (10/10 + CV 0.24%) — only TPS hit'
  - '⚠ Do NOT enable --enable-prefix-caching (DS conv state crash on hybrid GDN)'
