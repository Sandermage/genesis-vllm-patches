# Mypy configuration for sndr-platform.
# https://mypy.readthedocs.io/
#
# Engineering principle: the new sndr/ tree is type-strict from day one.
# Legacy vllm/sndr_core/ stays untyped during migration; it will be
# progressively typed as files move into sndr/.

[mypy]
python_version = 3.10
strict = True
warn_unused_configs = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
warn_unreachable = True
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True
disallow_untyped_decorators = True
no_implicit_optional = True
strict_optional = True
show_error_codes = True
pretty = True

# Only check the new sndr/ tree. Legacy code is excluded.
files = sndr/

# Allow loose typing in tests.
[mypy-tests.*]
disallow_untyped_defs = False
strict = False

# Third-party libraries without stubs.
[mypy-vllm.*]
ignore_missing_imports = True

[mypy-vllm]
ignore_missing_imports = True

[mypy-prometheus_client.*]
ignore_missing_imports = True

[mypy-cryptography.*]
ignore_missing_imports = True

# Lazy import of opentelemetry — install on demand.
[mypy-opentelemetry.*]
ignore_missing_imports = True
