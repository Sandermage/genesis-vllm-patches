
services:
  vllm-server:
    image: vllm/vllm-openai:nightly-patched
    container_name: vllm-server
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS=1
      - VLLM_NO_USAGE_STATS=1
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True,max_split_size_mb:512
      - VLLM_FLOAT32_MATMUL_PRECISION=high
      - NCCL_P2P_DISABLE=1
      - VLLM_USE_FLASHINFER_SAMPLER=1
      - OMP_NUM_THREADS=1
      - CUDA_DEVICE_MAX_CONNECTIONS=8
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
      - TRITON_CACHE_DIR=/root/.triton/cache
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      - VLLM_MARLIN_USE_ATOMIC_ADD=1
      - VLLM_MARLIN_MOE_BLOCK_SIZE_M=8
      - VLLM_MOE_USE_DEEP_GEMM=0
      - VLLM_USE_DEEP_GEMM=0
      - VLLM_USE_FLASHINFER_MOE_FP8=0
    volumes:
      - /nfs/genesis/models:/models:ro
      - ~/.cache/huggingface:/root/.cache/huggingface:ro
      - ./vllm_engine/triton-cache:/root/.triton/cache
      - ./vllm_engine/compile-cache:/root/.cache/vllm/torch_compile_cache
      - ./vllm_engine/patch_genesis_unified.py:/patches/patch_genesis_unified.py:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
        limits:
          memory: 64G
    shm_size: "8g"
    entrypoint: ["/bin/bash", "-c", "pip install pandas scipy xxhash -q && python3 /patches/patch_genesis_unified.py && exec vllm serve \"$@\"", "--"]
    command:
      - --model
      - /models/Qwen3.6-35B-A3B-FP8
      - --tensor-parallel-size
      - "2"
      - --gpu-memory-utilization
      - "0.85"
      - --max-model-len
      - "262144"
      - --kv-cache-dtype
      - turboquant_k8v4
      - --max-num-seqs
      - "2"
      - --max-num-batched-tokens
      - "4096"
      - --enable-chunked-prefill
      - --enable-prefix-caching
      - --dtype
      - float16
      - --disable-custom-all-reduce
      - --language-model-only
      - --trust-remote-code
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      - --reasoning-parser
      - qwen3
      - --api-key
      - API_KEY_REDACTED
      - --served-model-name
      - qwen3.6-35b-a3b
      - --host
      - 0.0.0.0
      - --async-scheduling
      - --performance-mode
      - interactivity
      - --attention-config.flash_attn_version
      - "2"
      - --port
      - "8000" 
      - --no-scheduler-reserve-full-isl
      - --prefix-caching-hash-algo
      - xxhash
      - --disable-log-stats
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 300s
    security_opt:
      - no-new-privileges:true
    networks:
      - genesis


    networks:
      - genesis-net

networks:
  genesis-net:
    driver: bridge
